# yaml-language-server: $schema=../../../jsonschema/relixy.schema.json
version: v1
kind: OpenAPI
metadata:
  name: default
definition:
  settings:
    basePath: "/api/v1"
    headers: {}
    forwardHeaders:
      request: []
      response: []
    http:
      retry:
        maxAttempts: 3
  spec:
    openapi: "3.2.0"
    servers:
      - url: https://jsonplaceholder.typicode.com
    components:
      securitySchemes:
        apiKey:
          type: http
          scheme: bearer
    paths:
      /albums:
        get:
          operationId: getAlbums
          summary: "Get albums summary"
          description: "Get albums"
          x-rely-proxy-action:
            type: rest
      /posts/{id}:
        get:
          operationId: getPostById
          description: "Get post by ID"
          x-rely-proxy-action:
            type: rest
