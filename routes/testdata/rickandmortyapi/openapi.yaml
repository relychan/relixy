# yaml-language-server: $schema=../../../jsonschema/relixy.schema.json
version: v1
kind: OpenAPI
metadata:
  name: default
definition:
  settings:
    headers: {}
    forwardHeaders:
      request: []
      response: []
    http:
      timeout: 60s
      transport:
        tlsHandshakeTimeout: 10s
        forceAttemptHTTP2: false
      retry:
        maxAttempts:
          value: 3
  spec:
    openapi: "3.2.0"
    jsonSchemaDialect: https://spec.openapis.org/oas/3.2/dialect/2025-09-17
    servers:
      - url: https://rickandmortyapi.com/graphql
    paths:
      /characters:
        get:
          operationId: getCharacters
          description: "Get characters"
          x-rely-proxy-action:
            type: graphql
            request:
              query: |
                query GetCharacters {
                  characters(page: 1, filter: { name: "Morty" }) {
                    info {
                      count
                    }
                    results {
                      name
                    }
                  }
                  location(id: 1) {
                    id
                  }
                  episodesByIds(ids: [1, 2]) {
                    id
                  }
                }
      /characters/{id}:
        get:
          operationId: getCharacters
          description: "Get character by ID"
          x-rely-proxy-action:
            type: graphql
            request:
              query: |
                query Character($id: ID! = "1") {
                  character(id: $id) {
                    id
                    name
                  }
                }
---
version: v1
kind: RelyAuth
definition:
  settings: {}
  modes:
    - mode: apiKey
      tokenLocation:
        in: header
        name: hasura-m-auth
      value:
        value: "test-secret"
