# yaml-language-server: $schema=../../jsonschema/relixy-openapi.schema.json
version: v1
kind: OpenAPI3
metadata:
  name: default
definition:
  settings:
    headers: {}
    forwardHeaders:
      request: []
      response: []
    http:
      retry:
        maxAttempts:
          value: 3
  spec:
    servers:
      - url: https://jsonplaceholder.typicode.com
    paths:
      /albums:
        get:
          operationId: getAlbums
          summary: "Get albums summary"
          description: "Get albums"
          proxy:
            type: rest
      /posts/{id}:
        get:
          operationId: getPostById
          description: "Get post by ID"
          proxy:
            type: rest
