# yaml-language-server: $schema=../../jsonschema/relyx.schema.json
settings:
  headers: {}
  forwardHeaders:
    request: []
    response: []
  http:
    retry:
      maxAttempts:
        value: 3
servers:
  - url:
      value: https://jsonplaceholder.typicode.com
paths:
  /albums:
    get:
      operationId: getAlbums
      summary: "Get albums summary"
      description: "Get albums"
      proxy:
        type: rest
  /posts/{id}:
    get:
      operationId: getPostById
      description: "Get post by ID"
      proxy:
        type: rest
