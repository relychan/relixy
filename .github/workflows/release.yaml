name: Release
on:
  push:
    tags:
      - "v*"

env:
  GHCR_REGISTRY: ghcr.io
  DOCKER_IMAGE_NAME: relychan/rely-rest
  DOCKER_IMAGE_DDN_NAME: relychan/rely-rest-ddn

permissions:
  pull-requests: write
  packages: write

jobs:
  tests:
    uses: ./.github/workflows/test.yaml

  release-image:
    name: Release rely-rest image
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: relychan
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: get-version
        run: |
          echo "tagged_version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: rely-rest - Extract metadata (tags, labels) for Docker image
        id: docker-metadata
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKER_IMAGE_NAME }}
            ${{ env.GHCR_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}

      - name: rely-rest - Build and push
        uses: docker/build-push-action@v7
        id: docker-build
        with:
          push: true
          tags: ${{ steps.docker-metadata.outputs.tags }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:main-cache
          cache-to: type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:main-cache
          build-args: |
            VERSION=${{ steps.get-version.outputs.tagged_version }}

      - name: Scan High/Critical Vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: ${{ env.GHCR_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.get-version.outputs.tagged_version }}
          format: table
          severity: "CRITICAL,HIGH"
          scanners: vuln
          ignore-unfixed: true
          exit-code: 1

      - name: rely-rest-ddn - Extract metadata (tags, labels) for Docker image
        id: docker-metadata-ddn
        uses: docker/metadata-action@v6
        if: startsWith(github.ref, 'refs/tags/')
        with:
          images: |
            ${{ env.DOCKER_IMAGE_DDN_NAME }}
            ${{ env.GHCR_REGISTRY }}/${{ env.DOCKER_IMAGE_DDN_NAME }}

      - name: rely-rest-ddn - Build and push
        uses: docker/build-push-action@v7
        if: startsWith(github.ref, 'refs/tags/')
        with:
          push: true
          file: Dockerfile.ddn
          tags: ${{ steps.docker-metadata-ddn.outputs.tags }}
          labels: ${{ steps.docker-metadata-ddn.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.DOCKER_IMAGE_DDN_NAME }}:main-cache
          cache-to: type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.DOCKER_IMAGE_DDN_NAME }}:main-cache
          build-args: |
            VERSION=${{ steps.get-version.outputs.tagged_version }}
