openapi: 3.0.0
info:
    description: "This is a sample server Petstore server.  You can find out more about Swagger at [http://swagger.io](http://swagger.io) or on [irc.freenode.net, #swagger](http://swagger.io/irc/).  For this sample, you can use the api key `special-key` to test the authorization filters."
    version: "1.0.6"
    title: "Swagger Petstore"
    termsOfService: "http://swagger.io/terms/"
    contact:
        email: "apiteam@swagger.io"
    license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
servers:
    - url: https://petstore.swagger.io/v2
paths:
    /pet/{petId}/uploadImage:
        post:
            tags:
                - pet
            summary: uploads an image
            operationId: uploadFile
            parameters:
                - name: petId
                  in: path
                  description: ID of pet to update
                  required: true
                  style: simple
                  explode: false
                  schema:
                    type: integer
                    format: int64
            requestBody:
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            properties:
                                additionalMetadata:
                                    type: string
                                file:
                                    type: file
                required: true
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema: {"$ref": "#/components/schemas/ApiResponse"}
            security:
                - petstore_auth:
                    - write:pets
                    - read:pets
    /pet:
        put:
            tags:
                - pet
            summary: Update an existing pet
            operationId: updatePet
            requestBody:
                description: Pet object that needs to be added to the store
                content:
                    application/json:
                        schema: {"$ref": "#/components/schemas/Pet"}
                    application/xml:
                        schema: {"$ref": "#/components/schemas/Pet"}
                required: true
            responses:
                "400":
                    description: Invalid ID supplied
                    content:
                        application/json: {}
                        application/xml: {}
                "404":
                    description: Pet not found
                    content:
                        application/json: {}
                        application/xml: {}
                "405":
                    description: Validation exception
                    content:
                        application/json: {}
                        application/xml: {}
            security:
                - petstore_auth:
                    - write:pets
                    - read:pets
        post:
            tags:
                - pet
            summary: Add a new pet to the store
            operationId: addPet
            requestBody:
                description: Pet object that needs to be added to the store
                content:
                    application/json:
                        schema: {"$ref": "#/components/schemas/Pet"}
                    application/xml:
                        schema: {"$ref": "#/components/schemas/Pet"}
                required: true
            responses:
                "405":
                    description: Invalid input
                    content:
                        application/json: {}
                        application/xml: {}
            security:
                - petstore_auth:
                    - write:pets
                    - read:pets
    /pet/xml:
        put:
            operationId: updatePet
            requestBody:
                description: Pet object that needs to be added to the store
                content:
                    application/xml:
                        schema: {"$ref": "#/components/schemas/Pet"}
                required: true
            responses:
                "400":
                    description: Invalid ID supplied
                    content:
                        application/xml: {}
                "404":
                    description: Pet not found
                    content:
                        application/xml: {}
                "405":
                    description: Validation exception
                    content:
                        application/xml: {}
            security:
                - petstore_auth:
                    - write:pets
                    - read:pets
    /pet/findByStatus:
        get:
            tags:
                - pet
            summary: Finds Pets by status
            description: Multiple status values can be provided with comma separated strings
            operationId: findPetsByStatus
            parameters:
                - name: status
                  in: query
                  description: Status values that need to be considered for filter
                  required: true
                  style: form
                  explode: true
                  schema:
                    type: array
                    items:
                        exclusiveMaximum: false
                        exclusiveMinimum: false
                        type: string
                        maximum: 0
                        minimum: 0
                        enum:
                            - "available"
                            - "pending"
                            - "sold"
                        default: "available"
                    default: "available"
                  example: "available"
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                type: "array"
                                additionalProperties: true
                                items: {"$ref": "#/components/schemas/Pet"}
                        application/xml:
                            schema:
                                type: "array"
                                additionalProperties: true
                                items: {"$ref": "#/components/schemas/Pet"}
                "400":
                    description: Invalid status value
                    content:
                        application/json: {}
                        application/xml: {}
            security:
                - petstore_auth:
                    - write:pets
                    - read:pets
    /pet/findByTags:
        get:
            tags:
                - pet
            summary: Finds Pets by tags
            description: Multiple tags can be provided with comma separated strings. Use tag1, tag2, tag3 for testing.
            operationId: findPetsByTags
            parameters:
                - name: tags
                  in: query
                  description: Tags to filter by
                  required: true
                  style: form
                  explode: true
                  schema:
                    type: array
                    items:
                        exclusiveMaximum: false
                        exclusiveMinimum: false
                        type: string
                        maximum: 0
                        minimum: 0
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                type: "array"
                                items: {"$ref": "#/components/schemas/Pet"}
                        application/xml:
                            schema:
                                type: "array"
                                items: {"$ref": "#/components/schemas/Pet"}
                "400":
                    description: Invalid tag value
                    content:
                        application/json: {}
                        application/xml: {}
            deprecated: true
            security:
                - petstore_auth:
                    - write:pets
                    - read:pets
    /pet/{petId}:
        get:
            tags:
                - pet
            summary: Find pet by ID
            description: Returns a single pet
            operationId: getPetById
            parameters:
                - name: petId
                  in: path
                  description: ID of pet to return
                  required: true
                  style: simple
                  explode: false
                  schema:
                    type: integer
                    format: int64
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema: {"$ref": "#/components/schemas/Pet"}
                        application/xml:
                            schema: {"$ref": "#/components/schemas/Pet"}
                "400":
                    description: Invalid ID supplied
                    content:
                        application/json: {}
                        application/xml: {}
                "404":
                    description: Pet not found
                    content:
                        application/json: {}
                        application/xml: {}
            security:
                - api_key: []
        post:
            tags:
                - pet
            summary: Updates a pet in the store with form data
            operationId: updatePetWithForm
            parameters:
                - name: petId
                  in: path
                  description: ID of pet that needs to be updated
                  required: true
                  style: simple
                  explode: false
                  schema:
                    type: integer
                    format: int64
            requestBody:
                content:
                    application/x-www-form-urlencoded:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                status:
                                    type: string
                required: true
            responses:
                "405":
                    description: Invalid input
                    content:
                        application/json: {}
                        application/xml: {}
            security:
                - petstore_auth:
                    - write:pets
                    - read:pets
        delete:
            tags:
                - pet
            summary: Deletes a pet
            operationId: deletePet
            parameters:
                - name: api_key
                  in: header
                  required: false
                  style: simple
                  explode: false
                  schema:
                    type: string
                - name: petId
                  in: path
                  description: Pet id to delete
                  required: true
                  style: simple
                  explode: false
                  schema:
                    type: integer
                    format: int64
            responses:
                "400":
                    description: Invalid ID supplied
                    content:
                        application/json: {}
                        application/xml: {}
                "404":
                    description: Pet not found
                    content:
                        application/json: {}
                        application/xml: {}
            security:
                - petstore_auth:
                    - write:pets
                    - read:pets
    /store/order:
        post:
            tags:
                - store
            summary: Place an order for a pet
            operationId: placeOrder
            requestBody:
                description: order placed for purchasing the pet
                content:
                    application/json:
                        schema: {"$ref": "#/components/schemas/Order"}
                required: true
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema: {"$ref": "#/components/schemas/Order"}
                        application/xml:
                            schema: {"$ref": "#/components/schemas/Order"}
                "400":
                    description: Invalid Order
                    content:
                        application/json: {}
                        application/xml: {}
    /store/order/{orderId}:
        get:
            tags:
                - store
            summary: Find purchase order by ID
            description: For valid response try integer IDs with value >= 1 and <= 10. Other values will generated exceptions
            operationId: getOrderById
            parameters:
                - name: orderId
                  in: path
                  description: ID of pet that needs to be fetched
                  required: true
                  style: simple
                  explode: false
                  schema:
                    type: integer
                    maximum: 10
                    minimum: 1
                    format: int64
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema: {"$ref": "#/components/schemas/Order"}
                        application/xml:
                            schema: {"$ref": "#/components/schemas/Order"}
                "400":
                    description: Invalid ID supplied
                    content:
                        application/json: {}
                        application/xml: {}
                "404":
                    description: Order not found
                    content:
                        application/json: {}
                        application/xml: {}
        delete:
            tags:
                - store
            summary: Delete purchase order by ID
            description: For valid response try integer IDs with positive integer value. Negative or non-integer values will generate API errors
            operationId: deleteOrder
            parameters:
                - name: orderId
                  in: path
                  description: ID of the order that needs to be deleted
                  required: true
                  style: simple
                  explode: false
                  schema:
                    type: integer
                    minimum: 1
                    format: int64
            responses:
                "400":
                    description: Invalid ID supplied
                    content:
                        application/json: {}
                        application/xml: {}
                "404":
                    description: Order not found
                    content:
                        application/json: {}
                        application/xml: {}
    /store/inventory:
        get:
            tags:
                - store
            summary: Returns pet inventories by status
            description: Returns a map of status codes to quantities
            operationId: getInventory
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                type: "object"
                                additionalProperties:
                                    type: "integer"
                                    format: "int32"
            security:
                - api_key: []
    /user/createWithArray:
        post:
            tags:
                - user
            summary: Creates list of users with given input array
            operationId: createUsersWithArrayInput
            requestBody:
                description: List of user object
                content:
                    application/json:
                        schema:
                            type: "array"
                            items: {"$ref": "#/components/schemas/User"}
                required: true
            responses:
                default:
                    description: successful operation
                    content:
                        application/json: {}
                        application/xml: {}
    /user/createWithList:
        post:
            tags:
                - user
            summary: Creates list of users with given input array
            operationId: createUsersWithListInput
            requestBody:
                description: List of user object
                content:
                    application/json:
                        schema:
                            type: "array"
                            items: {"$ref": "#/components/schemas/User"}
                required: true
            responses:
                default:
                    description: successful operation
                    content:
                        application/json: {}
                        application/xml: {}
    /user/{username}:
        get:
            tags:
                - user
            summary: Get user by user name
            operationId: getUserByName
            parameters:
                - name: username
                  in: path
                  description: 'The name that needs to be fetched. Use user1 for testing. '
                  required: true
                  style: simple
                  explode: false
                  schema:
                    type: string
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema: {"$ref": "#/components/schemas/User"}
                        application/xml:
                            schema: {"$ref": "#/components/schemas/User"}
                "400":
                    description: Invalid username supplied
                    content:
                        application/json: {}
                        application/xml: {}
                "404":
                    description: User not found
                    content:
                        application/json: {}
                        application/xml: {}
        put:
            tags:
                - user
            summary: Updated user
            description: This can only be done by the logged in user.
            operationId: updateUser
            parameters:
                - name: username
                  in: path
                  description: name that need to be updated
                  required: true
                  style: simple
                  explode: false
                  schema:
                    type: string
            requestBody:
                description: Updated user object
                content:
                    application/json:
                        schema: {"$ref": "#/components/schemas/User"}
                required: true
            responses:
                "400":
                    description: Invalid user supplied
                    content:
                        application/json: {}
                        application/xml: {}
                "404":
                    description: User not found
                    content:
                        application/json: {}
                        application/xml: {}
        delete:
            tags:
                - user
            summary: Delete user
            description: This can only be done by the logged in user.
            operationId: deleteUser
            parameters:
                - name: username
                  in: path
                  description: The name that needs to be deleted
                  required: true
                  style: simple
                  explode: false
                  schema:
                    type: string
            responses:
                "400":
                    description: Invalid username supplied
                    content:
                        application/json: {}
                        application/xml: {}
                "404":
                    description: User not found
                    content:
                        application/json: {}
                        application/xml: {}
    /user/login:
        get:
            tags:
                - user
            summary: Logs user into the system
            operationId: loginUser
            parameters:
                - name: username
                  in: query
                  description: The user name for login
                  required: true
                  style: form
                  explode: false
                  schema:
                    type: string
                - name: password
                  in: query
                  description: The password for login in clear text
                  required: true
                  style: form
                  explode: false
                  schema:
                    type: string
            responses:
                "200":
                    description: successful operation
                    headers:
                        X-Expires-After:
                            description: date in UTC when token expires
                            schema:
                                exclusiveMaximum: false
                                exclusiveMinimum: false
                                type: string
                                maximum: 0
                                minimum: 0
                                format: string
                        X-Rate-Limit:
                            description: calls per hour allowed by the user
                            schema:
                                exclusiveMaximum: false
                                exclusiveMinimum: false
                                type: integer
                                maximum: 0
                                minimum: 0
                                format: integer
                    content:
                        application/json:
                            schema:
                                type: "string"
                        application/xml:
                            schema:
                                type: "string"
                "400":
                    description: Invalid username/password supplied
                    content:
                        application/json: {}
                        application/xml: {}
    /user/logout:
        get:
            tags:
                - user
            summary: Logs out current logged in user session
            operationId: logoutUser
            responses:
                default:
                    description: successful operation
                    content:
                        application/json: {}
                        application/xml: {}
    /user/logout-redirect:
        get:
            operationId: logoutUserRedirect
            responses:
                "302":
                    description: successful operation
    /user:
        post:
            tags:
                - user
            summary: Create user
            description: This can only be done by the logged in user.
            operationId: createUser
            requestBody:
                description: Created user object
                content:
                    application/json:
                        schema: {"$ref": "#/components/schemas/User"}
                required: true
            responses:
                default:
                    description: successful operation
                    content:
                        application/json: {}
                        application/xml: {}
    /snake:
        get:
            tags:
                - snake
            summary: Get snake
            operationId: getSnake
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema: {"$ref": "#/components/schemas/snake_object"}
                        application/xml:
                            schema: {"$ref": "#/components/schemas/snake_object"}
        post:
            tags:
                - snake
            summary: Create snake
            operationId: addSnake
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema: {"$ref": "#/components/schemas/snake_object"}
                        application/xml:
                            schema: {"$ref": "#/components/schemas/snake_object"}
    /clients:
        get:
            summary: List OAuth 2.0 Clients
            operationId: listOAuth2Clients
            parameters:
                - name: limit
                  in: query
                  description: The maximum amount of clients to returned, upper bound is 500 clients.
                  style: form
                  explode: false
                  schema:
                    type: integer
                    format: int64
                - name: offset
                  in: query
                  description: The offset from where to start looking.
                  style: form
                  explode: false
                  schema:
                    type: integer
                    format: int64
                - name: client_name
                  in: query
                  description: The name of the clients to filter by.
                  style: form
                  explode: false
                  schema:
                    type: string
                - name: owner
                  in: query
                  description: The owner of the clients to filter by.
                  style: form
                  explode: false
                  schema:
                    type: string
                - name: start_date
                  in: query
                  description: The date that the IP address was entered into warmup.
                  style: form
                  explode: false
                  schema:
                    type: "null"
            responses:
                default:
                    description: jsonError
                    content:
                        application/json:
                            schema: {"$ref": "#/components/schemas/ApiResponse"}
                "200":
                    description: A list of clients.
                    content:
                        application/json:
                            schema:
                                type: "array"
                                items: {"$ref": "#/components/schemas/oAuth2Client"}
    /oauth2/register:
        post:
            operationId: dynamicClientRegistrationCreateOAuth2Client
            requestBody:
                content:
                    application/json:
                        schema: {"$ref": "#/components/schemas/oAuth2Client"}
                required: true
            responses:
                default:
                    description: jsonError
                    content:
                        application/json:
                            schema: {"$ref": "#/components/schemas/ApiResponse"}
                "201":
                    description: oAuth2Client
                    content:
                        application/json:
                            schema: {"$ref": "#/components/schemas/oAuth2Client"}
    /contactdb/lists/{list_id}/recipients:
        get:
            operationId: GET_contactdb-lists-list_id-recipients
            parameters:
                - name: on-behalf-of
                  in: header
                  style: simple
                  explode: false
                  schema:
                    type: string
                    default: "The subuser's username. This header generates the API call as if the subuser account was making the call."
                  example: "The subuser's username. This header generates the API call as if the subuser account was making the call."
            responses:
                "200":
                    description: ""
            security:
                - Authorization: []
        parameters:
            - name: list_id
              in: path
              description: The id of the list of recipients you want to retrieve.
              required: true
              style: simple
              explode: false
              schema:
                type: integer
    /browsers/stats:
        get:
            description: |-
                **This endpoint allows you to retrieve your email statistics segmented by browser type.**

                **We only store up to 7 days of email activity in our database.** By default, 500 items will be returned per request via the Advanced Stats API endpoints.

                Advanced Stats provide a more in-depth view of your email statistics and the actions taken by your recipients. You can segment these statistics by geographic location, device type, client type, browser, and mailbox provider. For more information about statistics, please see our [Statistics Overview](https://sendgrid.com/docs/ui/analytics-and-reporting/stats-overview/).
            operationId: GET_browsers-stats
            parameters:
                - name: browsers
                  in: query
                  description: The browsers to get statistics for. You can include up to 10 different browsers by including this parameter multiple times.
                  style: form
                  explode: false
                  schema:
                    type: string
                - name: on-behalf-of
                  in: header
                  style: simple
                  explode: false
                  schema:
                    type: string
                    default: "The subuser's username. This header generates the API call as if the subuser account was making the call."
                  example: "The subuser's username. This header generates the API call as if the subuser account was making the call."
                - name: limit
                  in: query
                  description: The number of results to return.
                  required: false
                  style: form
                  explode: false
                  schema:
                    type: integer
                - name: offset
                  in: query
                  description: The point in the list to begin retrieving results.
                  required: false
                  style: form
                  explode: false
                  schema:
                    type: integer
                - name: aggregated_by
                  in: query
                  description: How to group the statistics. Must be either "day", "week", or "month".
                  required: false
                  style: form
                  explode: false
                  schema:
                    type: string
                    enum:
                        - "day"
                        - "week"
                        - "month"
                - name: start_date
                  in: query
                  description: The starting date of the statistics to retrieve. Must follow format YYYY-MM-DD.
                  required: true
                  style: form
                  explode: false
                  schema:
                    type: string
                - name: end_date
                  in: query
                  description: The end date of the statistics to retrieve. Defaults to today. Must follow format YYYY-MM-DD.
                  required: false
                  style: form
                  explode: false
                  schema:
                    type: string
            responses:
                "200":
                    description: ""
            security:
                - Authorization: []
    /geo/stats:
        get:
            operationId: GET_geo-stats
            parameters:
                - name: on-behalf-of
                  in: header
                  style: simple
                  explode: false
                  schema:
                    type: string
                    default: "The subuser's username. This header generates the API call as if the subuser account was making the call."
                  example: "The subuser's username. This header generates the API call as if the subuser account was making the call."
            responses:
                "200":
                    description: ""
            security:
                - Authorization: []
    /whitelabel/domains/subuser:
        get:
            operationId: GET_whitelabel-domains-subuser
            parameters:
                - name: username
                  in: query
                  description: Username for the subuser to find associated authenticated domain.
                  required: true
                  style: form
                  explode: false
                  schema:
                    type: string
            responses:
                "200":
                    description: ""
            security:
                - Authorization: []
    /id/{identifier}:
        get:
            summary: Explore details about a given subject node
            operationId: get subject
            parameters:
                - name: identifier
                  in: path
                  description: |
                    The identifier path of the `subject` you're looking for
                  required: true
                  style: simple
                  explode: false
                  schema:
                    type: string
            responses:
                "200":
                    description: |
                        `subject` found
                    content:
                        text/html: {}
                        application/ld+json: {}
                        application/json: {}
                "404":
                    description: |
                        `subject` not found
                    content:
                        text/html: {}
                        application/ld+json: {}
                        application/json: {}
components:
    schemas:
        Foo:
            type: "object"
            properties:
                "code":
                    type: "integer"
                    format: "int32"
                "type":
                    type: "string"
                "message":
                    type: "string"
        ApiResponse:
            type: "object"
            properties:
                "code":
                    type: "integer"
                    format: "int32"
                "type":
                    type: "string"
                "message":
                    type: "string"
        Category:
            type: "object"
            properties:
                "id":
                    type: "integer"
                    format: "int64"
                "name":
                    type: "string"
            xml:
                name: "Category"
        Pet:
            type: "object"
            required:
                - "name"
                - "photoUrls"
            properties:
                "id":
                    type: "integer"
                    format: "int64"
                "category": {"$ref": "#/components/schemas/Category"}
                "name":
                    type: "string"
                    example: "doggie"
                "field":
                    type: "null"
                    description: "This empty field is returned instead of the list of scopes if the user making the call doesn't have the authorization required."
                "photoUrls":
                    type: "array"
                    xml:
                        wrapped: true
                    items:
                        type: "string"
                        xml:
                            name: "photoUrl"
                "tags":
                    type: "array"
                    xml:
                        wrapped: true
                    items: {"xml": {"name": "tag"}, "$ref": "#/components/schemas/Tag"}
                "status":
                    type: "string"
                    description: "pet status in the store"
                    enum:
                        - "available"
                        - "pending"
                        - "sold"
            xml:
                name: "Pet"
        Tag:
            type: "object"
            properties:
                "id":
                    type: "integer"
                    format: "int64"
                "name":
                    type: "string"
            xml:
                name: "Tag"
        Order:
            type: "object"
            properties:
                "id":
                    type: "integer"
                    format: "int64"
                "petId":
                    type: "integer"
                    format: "int64"
                "quantity":
                    type: "integer"
                    format: "int32"
                "shipDate":
                    type: "string"
                    format: "date-time"
                "status":
                    type: "string"
                    description: "Order Status"
                    enum:
                        - "placed"
                        - "approved"
                        - "delivered"
                "complete":
                    type: "boolean"
            xml:
                name: "Order"
        User:
            type: "object"
